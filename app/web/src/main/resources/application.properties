server.address=0.0.0.0
server.port=8085
spring.application.name=usercenter-web
spring.security.user.name=admin
spring.security.user.password=devtest123
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
management.endpoint.health.show-details=always
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
management.endpoint.health.validate-group-membership=false
spring.main.allow-bean-definition-overriding=true
# Datasource
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/user}
spring.datasource.username=${DATABASE_USERNAME:adam}
spring.datasource.password=${DATABASE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# MyBatis
mybatis.mapper-locations=classpath*:mapper/custom/*.xml
mybatis.type-aliases-package=com.alipay.usercenter.common.dal.auto.dataobject

# Tell SOFA RPC which port bolt is listening on and what IP to advertise
com.alipay.sofa.rpc.bolt.port=12201
com.alipay.sofa.rpc.registry.address=${NACOS_ADDRESS:nacos://127.0.0.1:8848}
com.alipay.sofa.rpc.rest.enable=true
com.alipay.sofa.rpc.rest.port=8342

stripe.apiKey=${STRIPE_API_KEY}
