[phases.setup]
nixPkgs = ["jdk17", "maven"]

[phases.build]
cmds = [
  # Write ~/.m2/settings.xml from Railway env vars so Maven can reach GitHub Packages
  "mkdir -p ~/.m2",
  """cat > ~/.m2/settings.xml <<'EOF'
<settings>
  <servers>
    <server>
      <id>github-iuser</id>
      <username>${GITHUB_ACTOR}</username>
      <password>${GITHUB_TOKEN}</password>
    </server>
    <server>
      <id>github-iaccount</id>
      <username>${GITHUB_ACTOR}</username>
      <password>${GITHUB_TOKEN}</password>
    </server>
    <server>
      <id>github-iwallet</id>
      <username>${GITHUB_ACTOR}</username>
      <password>${GITHUB_TOKEN}</password>
    </server>
    <server>
      <id>github-imerchant</id>
      <username>${GITHUB_ACTOR}</username>
      <password>${GITHUB_TOKEN}</password>
    </server>
  </servers>
</settings>
EOF""",
  "mvn -DoutputFile=target/mvn-dependency-list.log -B -DskipTests clean dependency:list install -Pproduction"
]

[start]
cmd = "java -jar app/web/target/*.jar"
